<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Incidencias</title>

  <style>
    body { font-family: Arial; margin: 20px; background: #f4f4f4; }
    h2 { margin-top: 30px; }
    form, .search, .results { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    input, select, textarea, button { width: 100%; margin: 5px 0 10px; padding: 8px; }
    button { background: #007BFF; color: white; border: none; cursor: pointer; }
    button:hover { background: #0056b3; }
    .hidden { display: none; }
    .card { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
    .delete-btn { background: red; margin-top: 10px; }
    .delete-btn:hover { background: darkred; }
  </style>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

<h1>Registro de Incidencias de Esterilización</h1>

<form id="registroForm">
  <label>Nombre de la persona</label>
  <input type="text" id="usuario" required>

  <label>Número de material</label>
  <input type="text" id="numero" required>

  <label>Nombre del material</label>
  <input type="text" id="nombre" required>

  <label>Tipo de registro</label>
  <select id="tipo" required>
    <option value="">Seleccione</option>
    <option value="incidencia">Incidencia</option>
    <option value="modificacion">Modificación</option>
  </select>

  <div id="descripcionContainer" class="hidden">
    <label>Descripción</label>
    <textarea id="descripcion"></textarea>
  </div>

  <div id="ordenContainer" class="hidden">
    <label>Quién autoriza la modificación</label>
    <input type="text" id="orden">
  </div>

  <button type="submit">Guardar</button>
</form>

<div class="search">
  <h2>Consulta por número de material</h2>
  <input type="text" id="buscarNumero" placeholder="Introduce número de material">
  <button onclick="buscar()">Buscar</button>
</div>

<div class="results">
  <h2>Resultados</h2>
  <div id="incidencias"><h3>Incidencias</h3></div>
  <div id="modificaciones"><h3>Modificaciones</h3></div>
</div>

<script>
  // 🔥 CONFIGURACIÓN FIREBASE
  const firebaseConfig = {
    apiKey: "XXXX",
    authDomain: "XXXX",
    projectId: "XXXX"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const tipoSelect = document.getElementById('tipo');
  const descripcionContainer = document.getElementById('descripcionContainer');
  const ordenContainer = document.getElementById('ordenContainer');

  tipoSelect.addEventListener('change', () => {
    const tipo = tipoSelect.value;
    descripcionContainer.classList.remove('hidden');

    if (tipo === 'modificacion') {
      ordenContainer.classList.remove('hidden');
    } else {
      ordenContainer.classList.add('hidden');
    }
  });

  // GUARDAR
  document.getElementById('registroForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const registro = {
      usuario: document.getElementById('usuario').value,
      numero: document.getElementById('numero').value,
      nombre: document.getElementById('nombre').value,
      tipo: document.getElementById('tipo').value,
      descripcion: document.getElementById('descripcion').value,
      orden: document.getElementById('orden').value || null,
      fecha: new Date().toLocaleString()
    };

    if (registro.tipo === 'modificacion' && !registro.orden) {
      alert('Debe indicar quién autoriza la modificación');
      return;
    }

    try {
      await db.collection("registros").add(registro);

      alert("✅ Incidencia guardada correctamente");

      // LIMPIAR FORMULARIO
      document.getElementById('registroForm').reset();

      // OCULTAR CAMPOS
      descripcionContainer.classList.add('hidden');
      ordenContainer.classList.add('hidden');

    } catch (error) {
      alert("❌ Error al guardar");
      console.error(error);
    }
  });

  // BUSCAR
  async function buscar() {
    const numeroBuscado = document.getElementById('buscarNumero').value;

    const incidenciasDiv = document.getElementById('incidencias');
    const modificacionesDiv = document.getElementById('modificaciones');

    incidenciasDiv.innerHTML = '<h3>Incidencias</h3>';
    modificacionesDiv.innerHTML = '<h3>Modificaciones</h3>';

    const snapshot = await db.collection("registros").get();

    snapshot.forEach(doc => {
      const d = doc.data();

      if (d.numero === numeroBuscado) {
        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
          <strong>${d.nombre}</strong><br>
          Usuario: ${d.usuario}<br>
          Fecha: ${d.fecha}<br>
          Descripción: ${d.descripcion}<br>
          ${d.tipo === 'modificacion' ? 'Orden: ' + d.orden + '<br>' : ''}
          <button class="delete-btn" onclick="eliminar('${doc.id}')">🗑️ Borrar</button>
        `;

        if (d.tipo === 'incidencia') {
          incidenciasDiv.appendChild(card);
        } else {
          modificacionesDiv.appendChild(card);
        }
      }
    });
  }

  // ELIMINAR
  async function eliminar(id) {
    const confirmacion = confirm("¿Seguro que quieres borrar este registro?");

    if (!confirmacion) return;

    try {
      await db.collection("registros").doc(id).delete();
      alert("🗑️ Registro eliminado correctamente");

      buscar(); // refrescar resultados
    } catch (error) {
      alert("❌ Error al eliminar");
      console.error(error);
    }
  }
</script>

</body>
</html>
